  <text x="22" y="29" fill="#39ff88" font-size="12" font-family="ui-monospace,Consolas,monospace">OUTPUT</text>
  <text x="22" y="54" fill="#f7fbff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Structured foundations for future real-world work</text>
