<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
<defs>

<linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.24"/>
  <stop offset="55%" stop-color="#5ee7ff" stop-opacity="0.10"/>
  <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.08"/>
</linearGradient>
<linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#4f8cff"/>
  <stop offset="50%" stop-color="#5ee7ff"/>
  <stop offset="100%" stop-color="#39ff88"/>
</linearGradient>
<filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="8" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
  <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#122033" stroke-width="1"/>
</pattern>

</defs>

<rect width="1200" height="430" rx="28" fill="#05080d"/>
<rect x="1" y="1" width="1198" height="428" rx="27" fill="#0b1119" stroke="#1c2a3a" stroke-width="2"/>
<text x="54" y="54" fill="#a78bfa" font-size="16" font-family="ui-monospace,Consolas,monospace" letter-spacing="3">04 / PROJECT BEYOND LIFE</text>
<text x="54" y="94" fill="#f7fbff" font-size="31" font-family="Segoe UI,Arial,sans-serif" font-weight="750">Research before solutions.</text>
<text x="54" y="125" fill="#8ea0b5" font-size="17" font-family="Segoe UI,Arial,sans-serif">A private system for difficult questions, not public claims.</text>

<g transform="translate(130 250)">
  <circle cx="0" cy="0" r="104" fill="none" stroke="#1c2a3a" stroke-width="2"/>
  <circle cx="0" cy="0" r="78" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.72"/>
  <circle cx="0" cy="0" r="49" fill="none" stroke="#5ee7ff" stroke-width="2" opacity="0.82"/>
  <circle cx="0" cy="0" r="20" fill="#a78bfa" opacity="0.15" stroke="#a78bfa"/>
  <text x="0" y="-4" text-anchor="middle" fill="#f7fbff" font-size="12" font-family="ui-monospace,Consolas,monospace">PBL</text>
  <text x="0" y="14" text-anchor="middle" fill="#8ea0b5" font-size="9" font-family="ui-monospace,Consolas,monospace">PRIVATE</text>
</g>

<path d="M240 250 H390" stroke="#1c2a3a" stroke-width="2"/>
<path d="M390 250 C470 250 470 182 550 182 H622" fill="none" stroke="#a78bfa" stroke-width="2"/>
<path d="M390 250 C470 250 470 250 550 250 H622" fill="none" stroke="#5ee7ff" stroke-width="2"/>
<path d="M390 250 C470 250 470 318 550 318 H622" fill="none" stroke="#39ff88" stroke-width="2"/>

<g transform="translate(650 152)">
  <rect width="485" height="72" rx="16" fill="#0e1621" stroke="#1c2a3a"/>
  <text x="22" y="29" fill="#a78bfa" font-size="12" font-family="ui-monospace,Consolas,monospace">INPUT</text>
  <text x="22" y="54" fill="#f7fbff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Public research · papers · datasets · competing views</text>
</g>
<g transform="translate(650 236)">
  <rect width="485" height="72" rx="16" fill="#0e1621" stroke="#1c2a3a"/>
  <text x="22" y="29" fill="#5ee7ff" font-size="12" font-family="ui-monospace,Consolas,monospace">METHOD</text>
  <text x="22" y="54" fill="#f7fbff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Multi-model comparison · contradiction testing · governance</text>
</g>
<g transform="translate(650 320)">
